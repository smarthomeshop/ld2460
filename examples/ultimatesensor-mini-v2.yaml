# UltimateSensor Mini V2 LD2460 tracking package example.
# Schematic mapping:
#   ESP GPIO4 TX -> LD2460 RX
#   ESP GPIO5 RX <- LD2460 TX

substitutions:
  ld2460_tx_pin: GPIO4
  ld2460_rx_pin: GPIO5

packages:
  tracking:
    url: https://github.com/smarthomeshop/ld2460
    ref: v0.1.0
    files:
      - tracking-ld2460.yaml
    refresh: 1d
